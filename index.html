<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>个人作品集桌面</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body class="xp-body">
    <main class="desktop" aria-label="Windows XP 风格个人作品集桌面">
      <section class="desktop-grid" aria-label="桌面图标">
        <a class="desktop-icon" href="pages/about.html" data-open="关于我">
          <span class="icon-art computer" aria-hidden="true"></span>
          <span>关于我</span>
        </a>
        <a class="desktop-icon" href="pages/projects.html" data-open="作品集">
          <span class="icon-art folder" aria-hidden="true"></span>
          <span>作品集</span>
        </a>
        <a class="desktop-icon" href="pages/resume.html" data-open="履历">
          <span class="icon-art document" aria-hidden="true"></span>
          <span>履历</span>
        </a>
        <a class="desktop-icon" href="pages/contact.html" data-open="联系">
          <span class="icon-art mail" aria-hidden="true"></span>
          <span>联系</span>
        </a>
      </section>

      <button class="desktop-note" type="button" aria-expanded="false">
        <span class="note-title">欢迎.txt</span>
        <span class="note-copy">点击桌面图标进入页面</span>
      </button>

      <section class="xp-window intro-window" aria-label="桌面预览窗口">
        <div class="window-titlebar">
          <span>Portfolio Explorer</span>
          <div class="window-controls">
            <button type="button" data-window-minimize aria-label="最小化"></button>
            <button type="button" data-window-maximize aria-label="最大化"></button>
            <button type="button" data-window-close aria-label="关闭"></button>
          </div>
        </div>
        <div class="window-body">
          <p>这是一个 Windows XP 桌面形式的个人作品集入口。</p>
          <p>“关于我”由原来的“本电脑”改写而来，点击后进入独立页面。</p>
        </div>
      </section>
    </main>

    <nav class="taskbar" aria-label="任务栏">
      <button class="start-button" type="button" aria-controls="start-menu" aria-expanded="false">
        <span class="start-logo" aria-hidden="true"></span>
        开始
      </button>
      <div class="taskbar-apps" aria-label="已打开窗口">
        <button class="taskbar-tab active" type="button" data-window-restore>桌面</button>
      </div>
      <button class="taskbar-clock" type="button" aria-label="显示当前时间"></button>
    </nav>

    <section class="start-menu" id="start-menu" aria-hidden="true">
      <div class="start-menu-head">Personal Website</div>
      <a href="pages/about.html">关于我</a>
      <a href="pages/projects.html">作品集</a>
      <a href="pages/resume.html">履历</a>
      <a href="pages/contact.html">联系</a>
    </section>

    <script src="assets/desktop.js"></script>
  </body>
</html>
